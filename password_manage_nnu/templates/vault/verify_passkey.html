{% extends 'index.html' %}

{% block title %}Verify Passkey{% endblock %}

{% block content %}
<section class="min-h-[85vh] flex items-center py-20">
    <div class="max-w-md mx-auto w-full px-4">
        <div class="glass-card p-8 animate-fade-in-up opacity-0" style="animation-fill-mode:forwards;">
            <div class="text-center mb-8">
                <div
                    class="w-14 h-14 mx-auto rounded-2xl bg-gradient-to-br from-yellow-400 to-orange-500 flex items-center justify-center mb-4">
                    <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z">
                        </path>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold">Passkey Required</h1>
                <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">
                    Enter your vault passkey to
                    {% if action == 'edit' %}
                    <span class="text-blue-500 dark:text-purple-400 font-medium">edit</span>
                    {% else %}
                    <span class="text-red-500 font-medium">delete</span>
                    {% endif %}
                    <strong>{{ entry.website_name }}</strong>
                </p>
            </div>

            <form method="post" class="space-y-5">
                {% csrf_token %}

                <div>
                    <label for="id_verify_passkey" class="block text-sm font-medium mb-1.5">Passkey</label>
                    {{ form.passkey }}
                </div>

                <div class="flex items-center gap-3">
                    <a href="{% url 'vault_dashboard' %}"
                        class="flex-1 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 text-center text-sm font-medium hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                        Cancel
                    </a>
                    <button type="submit"
                        class="glow-btn flex-1 py-2.5 rounded-xl bg-gradient-to-r from-yellow-500 to-orange-500 text-white font-semibold text-sm shadow-lg hover:shadow-xl hover:scale-[1.02] transition-all duration-200">
                        Verify & Continue
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
