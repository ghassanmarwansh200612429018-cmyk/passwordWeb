{% extends 'index.html' %}

{% block title %}Add Entry{% endblock %}

{% block content %}
<section class="py-24">
    <div class="max-w-lg mx-auto px-4">
        <div class="glass-card p-8 animate-fade-in-up opacity-0" style="animation-fill-mode:forwards;">
            <!-- Header -->
            <div class="text-center mb-8">
                <div
                    class="w-14 h-14 mx-auto rounded-2xl bg-gradient-to-br from-green-400 to-green-600 flex items-center justify-center mb-4">
                    <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold">Add New Entry</h1>
                <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Save a new credential to your vault</p>
            </div>

            <form method="post" class="space-y-5">
                {% csrf_token %}

                <!-- Website Name -->
                <div>
                    <label for="website_name" class="block text-sm font-medium mb-1.5">Website Name</label>
                    <input type="text" name="website_name" id="website_name" required
                        class="w-full px-4 py-2.5 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-400 dark:focus:ring-purple-500 focus:border-transparent transition-all duration-200"
                        placeholder="e.g. Google, GitHub, etc.">
                </div>

                <!-- Username -->
                <div>
                    <label for="username" class="block text-sm font-medium mb-1.5">Username</label>
                    <input type="text" name="username" id="username" required
                        class="w-full px-4 py-2.5 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-400 dark:focus:ring-purple-500 focus:border-transparent transition-all duration-200"
                        placeholder="Your username or handle">
                </div>

                <!-- Email -->
                <div>
                    <label for="email" class="block text-sm font-medium mb-1.5">Email</label>
                    <input type="email" name="email" id="email" required
                        class="w-full px-4 py-2.5 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-400 dark:focus:ring-purple-500 focus:border-transparent transition-all duration-200"
                        placeholder="you@example.com">
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-sm font-medium mb-1.5">Password</label>
                    <div class="relative">
                        <input type="password" name="password" id="password" required
                            class="w-full px-4 py-2.5 pr-24 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-400 dark:focus:ring-purple-500 focus:border-transparent transition-all duration-200"
                            placeholder="Enter or generate a password">
                        <div class="absolute right-2 top-1/2 -translate-y-1/2 flex items-center space-x-1">
                            <button type="button" data-toggle-password="password"
                                class="p-1.5 rounded hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z">
                                    </path>
                                </svg>
                            </button>
                            <button type="button" data-copy="password"
                                class="p-1.5 rounded hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors text-gray-400 hover:text-gray-600 dark:hover:text-gray-300"
                                title="Copy">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3">
                                    </path>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Password Generator -->
                <div class="p-4 rounded-xl bg-gray-50 dark:bg-gray-800/50 border border-gray-200 dark:border-gray-700">
                    <div class="flex items-center justify-between mb-3">
                        <span
                            class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">Password
                            Generator</span>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="flex items-center gap-2 flex-1">
                            <label for="password-length"
                                class="text-xs text-gray-500 dark:text-gray-400 whitespace-nowrap">Length:</label>
                            <input type="range" id="password-length" min="12" max="20" value="16"
                                class="flex-1 h-2 bg-gray-200 dark:bg-gray-700 rounded-lg appearance-none cursor-pointer accent-purple-500">
                            <span id="length-display" class="text-xs font-mono font-bold w-6 text-center">16</span>
                        </div>
                        <button type="button" data-generate-password="password"
                            class="px-4 py-2 rounded-lg bg-gradient-to-r from-blue-500 to-purple-600 text-white text-xs font-semibold hover:scale-105 transition-transform">
                            Generate
                        </button>
                    </div>
                </div>

                <!-- Actions -->
                <div class="flex items-center gap-3 pt-2">
                    <a href="{% url 'vault_dashboard' %}"
                        class="flex-1 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 text-center text-sm font-medium hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                        Cancel
                    </a>
                    <button type="submit"
                        class="glow-btn flex-1 py-2.5 rounded-xl bg-gradient-to-r from-blue-500 to-purple-600 text-white font-semibold text-sm shadow-lg hover:shadow-xl hover:scale-[1.02] transition-all duration-200">
                        Save Entry
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
    // Update length display
    const lengthSlider = document.getElementById('password-length');
    const lengthDisplay = document.getElementById('length-display');
    if (lengthSlider && lengthDisplay) {
        lengthSlider.addEventListener('input', () => { lengthDisplay.textContent = lengthSlider.value; });
    }
</script>
{% endblock %}
